; PlatformIO project: BataviaHeat Modbus-proxy
;
; De ESP32-S3-DevKitC-1 zit als SERIALISERENDE man-in-the-middle tussen de
; warmtepomp-tablet (Modbus-RTU master) en de warmtepomp (slave), en biedt
; Home Assistant een Modbus-TCP-server aan op poort 502.
; Zie BataviaHeat_Modbus_Proxy_PLAN.md voor de volledige architectuur.
;
; Bedrading (Waveshare TTL<->RS485 isolated, auto-direction):
;   ESP UART1 (GPIO13 TX / GPIO14 RX) -> board #1 -> TABLET-segment
;   ESP UART2 (GPIO21 TX / GPIO47 RX) -> board #2 -> POMP-segment
;   Log/upload via de onboard CH343 USB-UART (UART0, COM6).

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Standaard draadloos uploaden (OTA). USB niet meer nodig.
; Vul hieronder het IP-adres in dat jouw ESP32 op het netwerk krijgt.
; USB-fallback: pio run -e usb-flash -t upload
upload_protocol = espota
upload_port = ESP32_IP_HIER  ; bv. 192.168.1.91

; Log via de CH343 (UART0/COM6), niet via native USB-CDC, zodat UART1/UART2
; vrij blijven voor de twee RS485-bussen.
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0

; Alleen de proxy-firmware bouwen (loopback-test uitsluiten).
build_src_filter =
    +<*>
    -<loopback.cpp>

lib_deps =
    https://github.com/eModbus/eModbus.git

; ------------------------------------------------------------------------
; USB-fallback: zelfde proxy-firmware, maar via kabel flashen i.p.v. OTA.
;   pio run -e usb-flash -t upload
; ------------------------------------------------------------------------
[env:usb-flash]
extends = env:esp32-s3-devkitc-1
upload_protocol = esptool
upload_port =

; ------------------------------------------------------------------------
; Bench-test: controleert beide RS485-adapters + UARTs ZONDER pomp/tablet.
; Verbind eerst de RS485-zijdes: adapter#1 A+ <-> adapter#2 A+ en B- <-> B-.
; Flashen + monitoren:
;   pio run -e rs485-loopback -t upload -t monitor
; ------------------------------------------------------------------------
[env:rs485-loopback]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0
; Alleen het testbestand bouwen (proxy-main uitsluiten).
build_src_filter =
    +<loopback.cpp>
    -<main.cpp>
